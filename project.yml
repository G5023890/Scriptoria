name: MyNotes

options:
  bundleIdPrefix: com.grigorym
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"

packages:
  Highlightr:
    path: Vendor/Highlightr

settings:
  base:
    SWIFT_VERSION: 5.10

targets:
  MyNotes:
    type: application
    platform: iOS
    sources:
      - path: MyNotes
        excludes:
          - Info.plist
          - Info-macOS.plist
          - MyNotes.entitlements
          - MyNotes-macOS.entitlements
          - Resources
    dependencies:
      - package: Highlightr
        product: Highlightr
    resources:
      - path: MyNotes/Resources/Assets.xcassets
      - path: MyNotes/Resources/SampleData
      - path: MyNotes/Resources/README.md
    preBuildScripts:
      - name: Compile App Icon Asset Catalog
        script: |
          set -euo pipefail

          case "${PLATFORM_NAME:-}" in
            iphoneos)
              ACTOOL_PLATFORM="iphoneos"
              ;;
            iphonesimulator)
              ACTOOL_PLATFORM="iphonesimulator"
              ;;
            *)
              exit 0
              ;;
          esac

          ASSET_CATALOG_DIR="$SRCROOT/MyNotes/Resources/Assets.xcassets"
          OUTPUT_DIR="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"

          if [[ -d "$ASSET_CATALOG_DIR" ]]; then
            /usr/bin/xcrun actool "$ASSET_CATALOG_DIR" \
              --compile "$OUTPUT_DIR" \
              --platform "$ACTOOL_PLATFORM" \
              --minimum-deployment-target "$IPHONEOS_DEPLOYMENT_TARGET" \
              --target-device iphone \
              --app-icon AppIcon \
              --output-partial-info-plist "$TARGET_TEMP_DIR/assetcatalog_generated_info.plist"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grigorym.MyNotes
        PRODUCT_NAME: MyNotes
        DEVELOPMENT_TEAM: 9FP39GTDT5
        CODE_SIGN_ENTITLEMENTS: MyNotes/MyNotes.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MyNotes/Info.plist
        MARKETING_VERSION: "0.9.12"
        CURRENT_PROJECT_VERSION: "0.9.12"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
        SWIFT_EMIT_LOC_STRINGS: YES

  MyNotes-macOS:
    type: application
    platform: macOS
    sources:
      - path: MyNotes
        excludes:
          - Info.plist
          - Info-macOS.plist
          - MyNotes.entitlements
          - MyNotes-macOS.entitlements
          - Resources
    dependencies:
      - package: Highlightr
        product: Highlightr
    resources:
      - path: MyNotes/Resources/Assets.xcassets
      - path: MyNotes/Resources/SampleData
      - path: MyNotes/Resources/README.md
    preBuildScripts:
      - name: Generate macOS App Icon
        script: |
          set -euo pipefail

          OUTPUT_DIR="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          mkdir -p "$OUTPUT_DIR"

          SOURCE_ICON="$SRCROOT/MyNotes/Resources/AppIcon-macOS-source.png"
          if [[ ! -f "$SOURCE_ICON" ]]; then
            SOURCE_ICON="$SRCROOT/MyNotes/Resources/Assets.xcassets/AppIcon.appiconset/Icon-1024.png"
          fi
          if [[ ! -f "$SOURCE_ICON" ]]; then
            exit 0
          fi

          WORK_DIR="$TARGET_TEMP_DIR/AppIcon.iconset"
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"

          /usr/bin/sips -z 16 16     "$SOURCE_ICON" --out "$WORK_DIR/icon_16x16.png" >/dev/null
          /usr/bin/sips -z 32 32     "$SOURCE_ICON" --out "$WORK_DIR/icon_16x16@2x.png" >/dev/null
          /usr/bin/sips -z 32 32     "$SOURCE_ICON" --out "$WORK_DIR/icon_32x32.png" >/dev/null
          /usr/bin/sips -z 64 64     "$SOURCE_ICON" --out "$WORK_DIR/icon_32x32@2x.png" >/dev/null
          /usr/bin/sips -z 128 128   "$SOURCE_ICON" --out "$WORK_DIR/icon_128x128.png" >/dev/null
          /usr/bin/sips -z 256 256   "$SOURCE_ICON" --out "$WORK_DIR/icon_128x128@2x.png" >/dev/null
          /usr/bin/sips -z 256 256   "$SOURCE_ICON" --out "$WORK_DIR/icon_256x256.png" >/dev/null
          /usr/bin/sips -z 512 512   "$SOURCE_ICON" --out "$WORK_DIR/icon_256x256@2x.png" >/dev/null
          /usr/bin/sips -z 512 512   "$SOURCE_ICON" --out "$WORK_DIR/icon_512x512.png" >/dev/null
          /bin/cp "$SOURCE_ICON" "$WORK_DIR/icon_512x512@2x.png"

          /usr/bin/iconutil -c icns "$WORK_DIR" -o "$OUTPUT_DIR/AppIcon.icns"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grigorym.MyNotes
        PRODUCT_NAME: MyNotes
        DEVELOPMENT_TEAM: 9FP39GTDT5
        CODE_SIGN_ENTITLEMENTS: MyNotes/MyNotes-macOS.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MyNotes/Info-macOS.plist
        MARKETING_VERSION: "0.9.12"
        CURRENT_PROJECT_VERSION: "0.9.12"
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: YES
        SUPPORTS_MACCATALYST: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"

schemes:
  MyNotes:
    build:
      targets:
        MyNotes: all
    run:
      config: Debug
    test:
      config: Debug

  MyNotes-macOS:
    build:
      targets:
        MyNotes-macOS: all
    run:
      config: Debug
    test:
      config: Debug
